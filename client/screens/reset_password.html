<body class="bg-background text-on-background font-body-md min-h-screen flex items-center justify-center p-md">
<div class="w-full max-w-md">
<!-- Form State -->
<div class="bg-surface-container-lowest border border-outline-variant p-xl" id="reset-form">
<h1 class="font-headline-md text-headline-md text-primary mb-md">Set a new password</h1>
<p class="font-body-sm text-body-sm text-on-surface-variant mb-lg">Please choose a strong password that you haven't used before.</p>
<form class="space-y-lg" onsubmit="event.preventDefault(); showSuccess();">
<div>
<label class="block font-label-md text-label-md text-on-surface mb-xs" for="new-password">New Password</label>
<input class="w-full border border-outline-variant rounded focus:border-primary focus:ring-0 font-body-md text-body-md px-md py-sm bg-surface-container-lowest" id="new-password" oninput="checkStrength(this.value)" required="" type="password"/>
<div class="mt-sm flex space-x-xs h-1">
<div class="flex-1 bg-surface-variant rounded-full transition-colors duration-300" id="str-1"></div>
<div class="flex-1 bg-surface-variant rounded-full transition-colors duration-300" id="str-2"></div>
<div class="flex-1 bg-surface-variant rounded-full transition-colors duration-300" id="str-3"></div>
</div>
<p class="font-label-sm text-label-sm text-on-surface-variant mt-xs h-4" id="str-text"></p>
</div>
<div>
<label class="block font-label-md text-label-md text-on-surface mb-xs" for="confirm-password">Confirm New Password</label>
<input class="w-full border border-outline-variant rounded focus:border-primary focus:ring-0 font-body-md text-body-md px-md py-sm bg-surface-container-lowest" id="confirm-password" required="" type="password"/>
</div>
<button class="w-full bg-primary-container text-on-primary font-label-md text-label-md py-md rounded transition-colors hover:bg-primary" type="submit">
                    Reset Password
                </button>
</form>
</div>
<!-- Success State (Hidden by default) -->
<div class="hidden bg-surface-container-lowest border border-outline-variant p-xl text-center" id="success-state">
<div class="w-16 h-16 rounded-full bg-[#10B981] flex items-center justify-center mx-auto mb-lg text-white">
<span class="material-symbols-outlined" data-weight="fill" style="font-size: 32px;">check</span>
</div>
<h2 class="font-headline-md text-headline-md text-primary mb-sm">Password updated!</h2>
<p class="font-body-sm text-body-sm text-on-surface-variant mb-xl">Your password has been changed successfully. You can now log in with your new credentials.</p>
<button class="w-full bg-primary-container text-on-primary font-label-md text-label-md py-md rounded transition-colors hover:bg-primary" onclick="showForm()">
                Go to Login
            </button>
</div>
</div>
<script>
        function showSuccess() {
            document.getElementById('reset-form').classList.add('hidden');
            document.getElementById('success-state').classList.remove('hidden');
        }

        function showForm() {
            document.getElementById('success-state').classList.add('hidden');
            document.getElementById('reset-form').classList.remove('hidden');
            // reset form visually for demo
            document.getElementById('new-password').value = '';
            document.getElementById('confirm-password').value = '';
            checkStrength('');
        }

        function checkStrength(val) {
            const str1 = document.getElementById('str-1');
            const str2 = document.getElementById('str-2');
            const str3 = document.getElementById('str-3');
            const strText = document.getElementById('str-text');

            // Reset
            str1.className = 'flex-1 bg-surface-variant rounded-full transition-colors duration-300';
            str2.className = 'flex-1 bg-surface-variant rounded-full transition-colors duration-300';
            str3.className = 'flex-1 bg-surface-variant rounded-full transition-colors duration-300';
            strText.textContent = '';

            if (val.length === 0) return;

            let strength = 0;
            if (val.length > 5) strength += 1;
            if (val.length > 8 && /[A-Z]/.test(val) && /[0-9]/.test(val)) strength += 1;
            if (val.length > 10 && /[^A-Za-z0-9]/.test(val)) strength += 1;

            if (strength >= 1) {
                str1.classList.replace('bg-surface-variant', 'bg-[#F59E0B]'); // amber for weak
                strText.textContent = 'Weak';
                strText.classList.replace('text-on-surface-variant', 'text-[#F59E0B]');
            }
            if (strength >= 2) {
                str1.classList.replace('bg-[#F59E0B]', 'bg-[#10B981]'); // green for medium
                str2.classList.replace('bg-surface-variant', 'bg-[#10B981]');
                strText.textContent = 'Good';
                strText.classList.replace('text-[#F59E0B]', 'text-[#10B981]');
            }
            if (strength >= 3) {
                str3.classList.replace('bg-surface-variant', 'bg-[#10B981]');
                strText.textContent = 'Strong';
            }
        }
    </script>
