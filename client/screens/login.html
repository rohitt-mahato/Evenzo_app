<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login - GoPlan</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-background": "#181c1e",
                        "on-secondary": "#ffffff",
                        "inverse-on-surface": "#eef1f3",
                        "on-primary-fixed-variant": "#414754",
                        "on-primary": "#ffffff",
                        "on-surface": "#181c1e",
                        "surface-bright": "#f7fafc",
                        "on-secondary-container": "#586377",
                        "surface-container-high": "#e5e9eb",
                        "on-tertiary-fixed-variant": "#524531",
                        "surface-tint": "#585e6c",
                        "on-primary-container": "#828796",
                        "inverse-surface": "#2d3133",
                        "outline": "#76777c",
                        "secondary-fixed": "#d8e3fa",
                        "error": "#ba1a1a",
                        "tertiary-fixed": "#f5dfc4",
                        "primary-fixed": "#dde2f3",
                        "surface-container-low": "#f1f4f6",
                        "on-secondary-fixed-variant": "#3c475a",
                        "on-tertiary-container": "#96856d",
                        "on-surface-variant": "#45474c",
                        "error-container": "#ffdad6",
                        "inverse-primary": "#c1c6d7",
                        "tertiary": "#0e0700",
                        "on-tertiary-fixed": "#241a09",
                        "surface-variant": "#e0e3e5",
                        "on-tertiary": "#ffffff",
                        "on-error": "#ffffff",
                        "on-error-container": "#93000a",
                        "secondary-fixed-dim": "#bcc7dd",
                        "secondary": "#545f72",
                        "surface-container": "#ebeef0",
                        "on-primary-fixed": "#161c27",
                        "primary-container": "#1a202c",
                        "background": "#f7fafc",
                        "surface": "#f7fafc",
                        "on-secondary-fixed": "#111c2c",
                        "tertiary-fixed-dim": "#d8c3a9",
                        "surface-dim": "#d7dadc",
                        "tertiary-container": "#291e0d",
                        "primary-fixed-dim": "#c1c6d7",
                        "outline-variant": "#c6c6cc",
                        "surface-container-lowest": "#ffffff",
                        "secondary-container": "#d5e0f7",
                        "primary": "#030813",
                        "surface-container-highest": "#e0e3e5"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "sm": "8px",
                        "xl": "40px",
                        "container-max": "1280px",
                        "xs": "4px",
                        "md": "16px",
                        "base": "4px",
                        "lg": "24px",
                        "gutter": "24px"
                    },
                    "fontFamily": {
                        "headline-lg": ["Inter"],
                        "headline-md": ["Inter"],
                        "headline-lg-mobile": ["Inter"],
                        "headline-sm": ["Inter"],
                        "display": ["Inter"],
                        "body-lg": ["Inter"],
                        "label-md": ["Inter"],
                        "body-md": ["Inter"],
                        "label-sm": ["Inter"],
                        "body-sm": ["Inter"]
                    },
                    "fontSize": {
                        "headline-lg": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                        "headline-md": ["24px", { "lineHeight": "32px", "fontWeight": "600" }],
                        "headline-lg-mobile": ["24px", { "lineHeight": "32px", "fontWeight": "600" }],
                        "headline-sm": ["20px", { "lineHeight": "28px", "fontWeight": "600" }],
                        "display": ["48px", { "lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "body-lg": ["18px", { "lineHeight": "28px", "fontWeight": "400" }],
                        "label-md": ["14px", { "lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600" }],
                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "label-sm": ["12px", { "lineHeight": "16px", "fontWeight": "500" }],
                        "body-sm": ["14px", { "lineHeight": "20px", "fontWeight": "400" }]
                    }
                }
            }
        }
    </script>
<style type="text/tailwindcss">
        @layer utilities {
            .material-symbols-outlined {
                font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            }
        }
    </style>
</head>
<body class="bg-background min-h-screen flex items-center justify-center p-md font-body-md text-body-md text-on-surface">
<main class="w-full max-w-[440px] bg-surface-container-lowest border border-surface-variant p-xl flex flex-col gap-lg rounded-DEFAULT">
<!-- Header -->
<div class="flex flex-col items-center text-center gap-sm mb-sm">
<div class="w-12 h-12 bg-primary-container text-on-primary rounded-DEFAULT flex items-center justify-center mb-xs">
<span class="material-symbols-outlined text-[28px]" data-weight="fill" style="font-variation-settings: 'FILL' 1;">confirmation_number</span>
</div>
<h1 class="font-headline-md text-headline-md text-on-surface">GoPlan</h1>
<p class="font-body-sm text-body-sm text-on-surface-variant">Sign in to manage your bookings and events.</p>
</div>
<!-- Form -->
<form action="#" class="flex flex-col gap-lg" method="POST">
<div class="flex flex-col gap-md">
<!-- Email Input -->
<div class="flex flex-col gap-xs">
<label class="font-label-sm text-label-sm text-on-surface" for="email">Email address</label>
<input class="w-full bg-surface-container-lowest border border-surface-variant rounded-lg px-md py-[10px] font-body-md text-body-md text-on-surface placeholder:text-outline outline-none focus:border-primary-container focus:ring-0 transition-colors" id="email" name="email" placeholder="name@company.com" required="" type="email"/>
</div>
<!-- Password Input -->
<div class="flex flex-col gap-xs relative">
<div class="flex justify-between items-center">
<label class="font-label-sm text-label-sm text-on-surface" for="password">Password</label>
<a class="font-label-sm text-label-sm text-primary-container hover:underline" href="#">Forgot password?</a>
</div>
<div class="relative w-full">
<input class="w-full bg-surface-container-lowest border border-surface-variant rounded-lg pl-md pr-xl py-[10px] font-body-md text-body-md text-on-surface placeholder:text-outline outline-none focus:border-primary-container focus:ring-0 transition-colors" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button aria-label="Toggle password visibility" class="absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-on-surface flex items-center justify-center" id="togglePassword" type="button">
<span class="material-symbols-outlined text-[20px]" id="visibilityIcon">visibility</span>
</button>
</div>
</div>
</div>
<!-- Remember Me -->
<div class="flex items-center">
<input class="w-4 h-4 rounded-DEFAULT border-surface-variant text-primary-container focus:ring-0 focus:ring-offset-0 cursor-pointer" id="remember" name="remember" type="checkbox"/>
<label class="ml-sm font-body-sm text-body-sm text-on-surface cursor-pointer select-none" for="remember">Remember me</label>
</div>
<!-- Submit Button -->
<button class="w-full bg-primary-container text-on-primary font-label-md text-label-md py-[12px] px-md rounded-DEFAULT hover:bg-on-surface transition-colors" type="submit">
                Sign In
            </button>
</form>
<!-- Divider -->
<div class="flex items-center gap-md py-xs">
<hr class="flex-1 border-t border-surface-variant"/>
<span class="font-label-sm text-label-sm text-on-surface-variant px-xs bg-surface-container-lowest">or continue with</span>
<hr class="flex-1 border-t border-surface-variant"/>
</div>
<!-- Social Logins -->
<div class="flex gap-md">
<button class="flex-1 flex items-center justify-center gap-sm bg-surface-container-lowest border border-surface-variant py-[10px] px-md rounded-DEFAULT font-label-sm text-label-sm text-on-surface hover:bg-surface-container-low transition-colors" type="button">
<span class="material-symbols-outlined text-[18px]">g_mobiledata</span>
                Google
            </button>
<button class="flex-1 flex items-center justify-center gap-sm bg-surface-container-lowest border border-surface-variant py-[10px] px-md rounded-DEFAULT font-label-sm text-label-sm text-on-surface hover:bg-surface-container-low transition-colors" type="button">
<span class="material-symbols-outlined text-[18px]">social_leaderboard</span>
                Facebook
            </button>
</div>
<!-- Footer Link -->
<p class="text-center font-body-sm text-body-sm text-on-surface mt-sm">
            Don't have an account? 
            <a class="font-label-md text-label-md text-primary-container hover:underline ml-xs" href="#">Sign up</a>
</p>
</main>
<script>
        // Simple password toggle interaction
        const togglePasswordBtn = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');
        const visibilityIcon = document.getElementById('visibilityIcon');

        togglePasswordBtn.addEventListener('click', function () {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            
            // Toggle icon
            if (type === 'text') {
                visibilityIcon.textContent = 'visibility_off';
            } else {
                visibilityIcon.textContent = 'visibility';
            }
        });
    </script>
</body></html>
